<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Рейтинг — ArenaFlow</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/rating.css}" href="rating.css">
</head>
<body>

    <header th:insert="Blocks/header :: header"></header>

    <div class="page">

        <div class="page-header">
            <h2>🏆 Рейтинг</h2>
            <p>Результати команд у турнірах у реальному часі</p>
        </div>

        <!-- Фільтр по турніру -->
        <div class="filter-bar glass">
            <div class="filter-label">Турнір:</div>
            <select id="tournamentFilter" onchange="loadRating()">
                <option value="">— Усі турніри —</option>
            </select>
            <div class="filter-label" style="margin-left:auto; opacity:.4; font-size:12px" id="lastUpdated"></div>
        </div>

        <!-- Топ-3 подіум -->
        <div id="podium" class="podium hidden"></div>

        <!-- Таблиця -->
        <div class="glass table-card">
            <div class="table-header">
                <span>Рейтингова таблиця</span>
                <button class="btn-sort" onclick="toggleSort()">
                    <span id="sortIcon">↓</span> <span id="sortLabel">За балами</span>
                </button>
            </div>
            <div id="ratingTable">
                <div class="r-loading">
                    <div class="spinner"></div>
                    <p>Завантаження…</p>
                </div>
            </div>
        </div>

    </div>

    <div id="toast"></div>
    <script th:src="@{/js/rating.js}" src="rating.js"></script>
</body>
</html>
