<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${title}"/>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>
    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            color:white;
            min-height:100vh;
            overflow-x:hidden;
        }

        /* NAVBAR */

        nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 60px;
            position:fixed;
            width:100%;
            top:0;
            background:rgba(0,0,0,0.2);
            backdrop-filter:blur(10px);
            z-index:100;
        }

        nav h1{
            font-size:26px;
        }

        nav ul{
            display:flex;
            gap:30px;
            list-style:none;
        }

        nav a{
            text-decoration:none;
            color:white;
            transition:0.3s;
        }

        nav a:hover{
            color:#00e5ff;
        }

        /* HERO */

        .hero{
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding-top:80px;
            animation:fadeIn 1.5s ease;
        }

        .hero h2{
            font-size:60px;
            margin-bottom:20px;
        }

        .hero p{
            max-width:600px;
            opacity:0.8;
        }

        .button{
            margin-top:40px;
            padding:15px 35px;
            background:#00e5ff;
            color:black;
            border-radius:12px;
            text-decoration:none;
            font-weight:600;
            transition:0.3s;
        }

        .button:hover{
            transform:scale(1.1);
        }

        /* FEATURES */

        .features{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:30px;
            padding:80px;
        }

        .card{
            background:rgba(255,255,255,0.1);
            border-radius:20px;
            padding:30px;
            backdrop-filter:blur(10px);
            transition:0.4s;
            transform:translateY(40px);
            opacity:0;
        }

        .card:hover{
            transform:translateY(-10px);
        }

        .card h3{
            margin-bottom:10px;
        }

        /* ANIMATION */

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        .show{
            transform:translateY(0);
            opacity:1;
            transition:1s;
        }

    </style>
</head>

<body>
<header th:insert="Blocks/header :: header"></header>

<section class="hero">

    <h2>Динамічний простір для змагань.<br>
        Де все рухається за чітким ритмом)</h2>

    <p>
        Сворюйте команди, Задавайте ролій(Журі,Учаники, Орнанізатори), завантажуйте свої проєкти та спостерігайте рейтиг команди.
    </p>

    <a class="button" href="/roli">Почати</a>

</section>

<section class="features">

    <div class="card">
        <h3>👥 Команди</h3>
        <p>Створюй та керуй командами учасників.</p>
    </div>

    <div class="card">
        <h3>🎲 Ролі</h3>
        <p>Роздавай ролі за статусом.</p>
    </div>

    <div class="card">
        <h3>📂 Завантаження проєктов</h3>
        <p>Команди можуть завантажити свої работи на платформу.</p>
    </div>

    <div class="card">
        <h3>🏆 Рейтинг</h3>
        <p>Спостерігайте за своїм рейтингом та насолюджуйтесь роботою)).</p>
    </div>

</section>

<script>

    /* анимация появления карточек */

    const cards = document.querySelectorAll(".card")

    window.addEventListener("scroll",()=>{

        cards.forEach(card=>{

            const top = card.getBoundingClientRect().top

            if(top < window.innerHeight - 100){

                card.classList.add("show")

            }

        })

    })

</script>
</body>
</html>
