<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Турніри — ArenaFlow</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/tournaments.css}" href="tournaments.css">
</head>
<body>

    <header th:insert="Blocks/header :: header"></header>

    <div class="page">

        <div class="page-header">
            <h2>🏟 Турніри</h2>
            <p>Створюйте турніри та керуйте командами</p>
        </div>

        <!-- Доступ тільки для Адміністратора / Організатора -->
        <div id="noAccess" class="glass access-denied">
            <div class="access-icon">🔒</div>
            <div class="access-title">Доступ обмежено</div>
            <div class="access-hint">Тільки Організатор або Адміністратор можуть керувати турнірами</div>
            <a href="/roli" class="btn-go">Зареєструватися →</a>
        </div>

        <div id="tournamentPanel" class="hidden">

            <!-- Створення -->
            <div class="glass create-card">
                <div class="create-top">
                    <div>
                        <div class="create-label">Новий турнір</div>
                        <div class="create-hint">Введіть назву і натисніть «Створити»</div>
                    </div>
                    <span class="badge" id="myRoleBadge"></span>
                </div>
                <div class="create-row">
                    <input id="tournamentName" placeholder="Назва турніру…" maxlength="50">
                    <button class="btn-create" onclick="createTournament()">+ Створити</button>
                </div>
            </div>

            <!-- Список турнірів -->
            <div id="tournamentsList"></div>

        </div>
    </div>

    <div id="toast"></div>
    <script th:src="@{/js/tournaments.js}" src="tournaments.js"></script>
</body>
</html>
