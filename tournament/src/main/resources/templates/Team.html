<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Команди</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <!DOCTYPE html>
        <style>
            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
                font-family:'Poppins',sans-serif;
            }

            body{
                background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
                color:white;
                min-height:100vh;
                overflow-x:hidden;
            }

            /* NAVBAR */
            nav{
                display:flex;
                justify-content:space-between;
                align-items:center;
                padding:20px 60px;
                position:fixed;
                width:100%;
                top:0;
                background:rgba(0,0,0,0.2);
                backdrop-filter:blur(10px);
                z-index:100;
            }
            nav h1{ font-size:26px; }
            nav ul{
                display:flex;
                gap:30px;
                list-style:none;
            }
            nav a{
                text-decoration:none;
                color:white;
                transition:0.3s;
            }
            nav a:hover{ color:#00e5ff; }

            /* HERO */
            .hero{
                height:100vh;
                display:flex;
                flex-direction:column;
                justify-content:center;
                align-items:center;
                text-align:center;
                padding-top:80px;
                animation:fadeIn 1.5s ease;
            }
            .hero h2{ font-size:60px; margin-bottom:20px; }
            .hero p{ max-width:600px; opacity:0.8; }

            .button{
                margin-top:40px;
                padding:15px 35px;
                background:#00e5ff;
                color:black;
                border-radius:12px;
                text-decoration:none;
                font-weight:600;
                transition:0.3s;
                border:none;
                cursor:pointer;
            }
            .button:hover{ transform:scale(1.1); }

            /* FEATURES */
            .features{
                display:grid;
                grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
                gap:30px;
                padding:80px;
            }

            .card{
                background:rgba(255,255,255,0.1);
                border-radius:20px;
                padding:30px;
                backdrop-filter:blur(10px);
                transition:0.4s;
                transform:translateY(40px);
                opacity:0;
            }
            .card:hover{ transform:translateY(-10px); }
            .card h3{ margin-bottom:10px; }

            /* TEAM */
            .teamCard{
                background:rgba(255,255,255,0.1);
                border-radius:20px;
                padding:25px;
                backdrop-filter:blur(10px);
                position:relative;
            }

            .teamHeader{
                display:flex;
                justify-content:space-between;
                align-items:center;
            }

            .menuBtn{
                background:none;
                border:none;
                font-size:24px;
                color:white;
                cursor:pointer;
            }

            .menu{
                position:absolute;
                right:20px;
                top:60px;
                background:rgba(0,0,0,0.8);
                border-radius:10px;
                display:none;
                overflow:hidden;
            }

            .menu button{
                display:block;
                width:180px;
                padding:10px;
                border:none;
                background:none;
                color:white;
                text-align:left;
                cursor:pointer;
            }

            .menu button:hover{
                background:rgba(255,255,255,0.1);
            }

            .members{
                margin-top:15px;
                padding-left:20px;
                max-height:300px;
                overflow-y:auto;
            }

            /* MEMBER ANIMATION */
            .memberItem{
                opacity:0;
                transform:translateY(20px);
                transition:0.4s;
            }
            .memberItem.show{
                opacity:1;
                transform:translateY(0);
            }

            .deleteMember{
                margin-left:10px;
                background:red;
                border:none;
                color:white;
                border-radius:6px;
                padding:2px 6px;
                cursor:pointer;
            }

            /* ANIMATION */
            @keyframes fadeIn{
                from{ opacity:0; transform:translateY(30px);}
                to{ opacity:1; transform:translateY(0);}
            }
            .show{
                transform:translateY(0);
                opacity:1;
                transition:1s;
            }
        </style>
    </head>

    <body>

    <header th:insert="Blocks/header :: header"></header>
    <section class="hero">
        <h2>Динамічний простір для змагань</h2>
        <p>Створюйте команди, додавайте учасників та керуйте ними.</p>
    </section>


    <section class="features">
        <h2 style="grid-column:1/-1;text-align:center;font-size:40px;">Команди</h2>
        <div style="grid-column:1/-1;text-align:center">
            <input id="teamInput" placeholder="Назва команди" style="padding:12px;border-radius:10px;border:none;width:250px;margin-right:10px;">
            <button class="button" onclick="addTeam()">Створити</button>
        </div>
        <div id="teamsContainer" style="grid-column:1/-1;display:grid;gap:20px;"></div>
    </section>

    <section class="features">
        <div class="card">
            <h3>👥 Команди</h3>
            <p>Створюй та керуй командами.</p>
        </div>
        <div class="card">
            <h3>🎲 Ролі</h3>
            <p>Роздавай ролі.</p>
        </div>
        <div class="card">
            <h3>📂 Проєкти</h3>
            <p>Завантажуйте роботи.</p>
        </div>
        <div class="card">
            <h3>🏆 Рейтинг</h3>
            <p>Слідкуйте за рейтингом.</p>
        </div>
    </section>

    <script>
        /* анімація карточок */
        const cards = document.querySelectorAll(".card")
        window.addEventListener("scroll",()=>{
            cards.forEach(card=>{
                const top = card.getBoundingClientRect().top
                if(top < window.innerHeight - 100){
                    card.classList.add("show")
                }
            })
        })

        /* TEAM SYSTEM */
        let teams = JSON.parse(localStorage.getItem("teams")) || []

        function saveTeams(){ localStorage.setItem("teams", JSON.stringify(teams)) }

        function addTeam(){
            const input = document.getElementById("teamInput")
            const name = input.value.trim()
            if(name==="") return
            teams.push({name:name, members:[]})
            input.value=""
            renderTeams()
            saveTeams()
        }

        function renderTeams(){
            const container = document.getElementById("teamsContainer")
            container.innerHTML=""
            teams.forEach((team,index)=>{
                const card = document.createElement("div")
                card.className="teamCard"
                card.innerHTML=`
        <div class="teamHeader">
            <h3>${team.name} (${team.members.length})</h3>
            <button class="menuBtn" onclick="toggleMenu(${index})">⋮</button>
        </div>
        <div class="menu" id="menu${index}">
            <button onclick="addMember(${index})">➕ Додати учасника</button>
            <button onclick="deleteTeam(${index})">🗑 Видалити команду</button>
        </div>
        <ul class="members">
            ${team.members.map((m,i)=>`
            <li class="memberItem">👤 ${m}
                <button class="deleteMember" onclick="deleteMember(${index},${i})">✖</button>
            </li>`).join("")}
        </ul>`
                container.appendChild(card)
                const members = card.querySelectorAll(".memberItem")
                members.forEach((el,i)=>setTimeout(()=>{el.classList.add("show")}, 80*i))
            })
        }

        function toggleMenu(index){
            const menu = document.getElementById("menu"+index)
            document.querySelectorAll(".menu").forEach(m=>m.style.display="none")
            menu.style.display = (menu.style.display==="block") ? "none":"block"
        }

        function addMember(index){
            const name = prompt("Ім'я учасника")
            if(!name) return
            teams[index].members.push(name)
            renderTeams()
            saveTeams()
        }

        function deleteTeam(index){
            if(!confirm("Видалити команду?")) return
            teams.splice(index,1)
            renderTeams()
            saveTeams()
        }

        function deleteMember(teamIndex,memberIndex){
            if(!confirm("Видалити учасника?")) return
            teams[teamIndex].members.splice(memberIndex,1)
            renderTeams()
            saveTeams()
        }

        renderTeams()
    </script>

    </body>
    </html>
