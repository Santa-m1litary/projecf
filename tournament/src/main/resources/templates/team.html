<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Команди</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/team.css}" href="team.css">
</head>
<body>

    <header th:insert="Blocks/header :: header"></header>

    <div class="page">

        <div class="page-header">
            <h2>👥 Команди</h2>
            <p>Створюйте команди та додавайте учасників</p>
        </div>

        <div class="create-section">
            <div class="create-row">
                <div class="input-wrap">
                    <input id="teamInput" placeholder="Назва команди (мін. 3 символи)…" maxlength="30">
                    <div class="input-meta">
                        <div class="team-requirements">
                            <span class="req-chip">🔤 Літери / цифри</span>
                            <span class="req-chip">📏 3 – 30 символів</span>
                        </div>
                        <span class="char-counter" id="teamCounter">0 / 30</span>
                    </div>
                    <div class="field-hint" id="teamHint"></div>
                </div>
                <button class="button" onclick="addTeam()">+ Створити</button>
            </div>
        </div>

        <div id="teamsContainer"></div>

    </div>

    <div id="toast"></div>
    <script th:src="@{/js/team.js}" src="team.js"></script>

</body>
</html>
